<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Message</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e1e2f, #2b5876);
  font-family: 'Georgia', serif;
  color: white;
}

/* Bigger Card */
.card {
  background: rgba(255,255,255,0.1);
  padding: 50px;
  border-radius: 25px;
  text-align: center;
  backdrop-filter: blur(20px);
  width: 450px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* Bigger Inputs */
input, textarea {
  width: 95%;
  padding: 14px;
  margin: 12px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* Button */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: #ff4b5c;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* Message Screen */
#messageScreen {
  font-size: 1.8rem;
  line-height: 1.8;

  max-height: 300px;
  overflow-y: auto;
  word-break: break-word;
}

.hidden { display: none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="login">
  <h1>🔐 Secret Message</h1>
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="checkPassword()">Unlock</button>
</div>

<!-- MESSAGE -->
<div class="card hidden" id="messageScreen"></div>

<!-- ADMIN -->
<div class="card hidden" id="adminPanel">
  <h2>⚙️ Admin Panel</h2>
  <textarea id="newMsg" rows="4" placeholder="Enter new message"></textarea>
  <input type="text" id="newPass" placeholder="Set new password">
  <button onclick="saveData()">Save</button>
</div>

<!-- FIREBASE -->
<script type="module">function typeWriter(text, element, speed = 40) {
  element.innerHTML = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiC1OJOO6zJ0_xOn9jxqIYc4yMlcJW_UY",
  authDomain: "secret-message-921ed.firebaseapp.com",
  projectId: "secret-message-921ed",
  storageBucket: "secret-message-921ed.firebasestorage.app",
  messagingSenderId: "338577901246",
  appId: "1:338577901246:web:784bd09ae18b813c1640ef"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SAVE DATA (ADMIN)
window.saveData = async function() {
  const msg = document.getElementById("newMsg").value;
  const pass = document.getElementById("newPass").value;

  if (!msg || !pass) {
    alert("Fill both fields!");
    return;
  }

  await setDoc(doc(db, "secret", "data"), {
    message: msg,
    password: pass
  });

  alert("Updated Successfully 🔥");
}

// CHECK PASSWORD
window.checkPassword = async function() {
  const input = document.getElementById("password").value;

  const snap = await getDoc(doc(db, "secret", "data"));

  if (snap.exists()) {
    const data = snap.data();

    if (input === "admin14") {
      document.getElementById("login").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");
    } 
    else if (input === data.password) {
      document.getElementById("login").classList.add("hidden");
      let msgScreen = document.getElementById("messageScreen");
      msgScreen.classList.remove("hidden");
      msgScreen.innerHTML = `✨ "${data.message}" ✨`;
    } 
    else {
      alert("Wrong Password ❌");
    }
  } else {
    alert("No data found! First set message from admin.");
  }
}
</script>

</body>
</html>
